name: Mirror to Personal Account

on:
  push:
    branches:
      - main  # <-- ADJUST THIS if your main branch is 'master'
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up SSH
        # This action securely loads the SSH key from secrets
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Push to mirror
        env:
          # Your personal username
          GH_USER: "ROHANBAIJU"
          # Your personal (mirror) repo name
          DEST_REPO: "SCOPE-OFFICIAL-WEBAPP-FOR-HOSTING"
        run: |
          echo "Pushing to SSH address: git@github.com:$GH_USER/$DEST_REPO.git"
          
          # This command adds github.com to the list of known hosts
          # to prevent an interactive "Are you sure?" prompt.
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          
          # This is the new push command using the SSH URL
          git push --mirror "git@github.com:$GH_USER/$DEST_REPO.git"
