name: Mirror to Personal Account

on:
  push:
    branches:
      - main  # Or 'master', etc.
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to mirror
        env:
          GH_PAT: ${{ secrets.DESTINATION_PAT }}
          GH_USER: "ROHANBAIJU" # This should be your username
          DEST_REPO: "SCOPE-OFFICIAL-WEBAPP-FOR-HOSTING" # This is your mirror repo
        
        run: |
          echo "Pushing to https://github.com/$GH_USER/$DEST_REPO.git"
          
          # Corrected line: removed the single quotes around the variables
          git push --mirror "https://$GH_USER:$GH_PAT@github.com/$GH_USER/$DEST_REPO.git"
