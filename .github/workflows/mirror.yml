name: Mirror to Personal Account

on:
  # Triggers the action on every push
  push:
    branches:
      - main  # <-- 1. CHANGE THIS if your main branch is 'master' or different
  
  # Also triggers on branch/tag deletion
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # This is necessary to get all history, branches, and tags
          fetch-depth: 0

      - name: Push to mirror
        env:
          # The token you stored as a secret in the organization repo
          GH_PAT: ${{ secrets.HOSTING_DESTINATION_PAT }}
          
          # Your personal GitHub username
          GH_USER: "ROHANBAIJU" # <-- 2. CHANGE THIS
          
          # The name of your new personal (mirror) repo
          DEST_REPO: "SCOPE-OFFICIAL-WEBAPP-FOR-HOSTING" # <-- 3. CHANGE THIS
        
        run: |
          echo "Pushing to https://github.com/$GH_USER/$DEST_REPO.git"
          
          # This command mirrors everything (all branches, tags)
          # It authenticates using the PAT you created
          git push --mirror "https://'$GH_USER:$GH_PAT'@github.com/$GH_USER/$DEST_REPO.git"
